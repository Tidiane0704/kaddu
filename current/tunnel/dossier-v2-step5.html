<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KADDU — Étape 5</title>
<style>
:root{
  --or:#BF9650; --nbl:#07182B; --txt:#F8F4EE; --muted:rgba(248,244,238,.7);
  --bdr:rgba(191,150,80,.18); --green:#00C875; --card:#0b2039;
}
body{font-family:Arial;background:var(--nbl);color:var(--txt);margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.box{background:var(--card);padding:30px;border:1px solid var(--bdr)}
.progress{height:6px;background:#333;border-radius:10px;overflow:hidden;margin-bottom:15px}
.fill{height:100%;background:var(--or)}
h1{font-size:32px;margin-bottom:10px}
.sub{color:var(--muted);margin-bottom:20px}
.recap{border:1px solid var(--bdr);padding:15px;margin:20px 0}
.next{border:1px solid var(--bdr);padding:15px;margin:20px 0}
.btn{padding:14px;margin-top:10px;width:100%;border:none;font-weight:bold;cursor:pointer}
.primary{background:var(--or);color:#111}
.secondary{background:transparent;border:1px solid var(--bdr);color:white}
.success{display:none;margin-top:20px;padding:15px;background:rgba(0,200,117,.1)}
.link{display:block;margin-top:10px;color:var(--muted);text-decoration:underline;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<div class="box">
<div class="progress"><div class="fill" style="width:100%"></div></div>
<h1 id="title">Votre dossier est prêt</h1>
<p class="sub" id="subtitle"></p>

<div class="recap">
<strong>Récapitulatif</strong>
<div id="recapContent"></div>
</div>

<div class="next">
<strong>Prochaines étapes</strong>
<ul id="nextSteps"></ul>
</div>

<button class="btn primary" id="sendBtn">Envoyer mon dossier</button>
<button class="btn secondary" onclick="window.location.href='/'" id="browseBtn">Explorer les offres</button>

<div class="link" onclick="editStep(1)">Modifier mes informations</div>
<div class="link" onclick="editStep(2)">Modifier mon profil</div>
<div class="link" onclick="editStep(3)">Modifier ma situation</div>
<div class="link" onclick="editStep(4)">Modifier mes documents</div>

<div class="success" id="successMsg">
Votre dossier a bien été envoyé.
</div>

</div>
</div>

<script>
const step1 = JSON.parse(localStorage.getItem("step1") || "{}");
const step2 = JSON.parse(localStorage.getItem("step2") || "{}");
const step3 = JSON.parse(localStorage.getItem("step3") || "{}");

const isSpecific = !!step1.bien;

if(isSpecific){
  title.innerText = "Votre candidature est prête";
  subtitle.innerText = "Votre dossier est prêt à être transmis pour ce logement.";
  nextSteps.innerHTML = `
    <li>Un retour vous sera apporté sous 24h.</li>
    <li>Des éléments complémentaires pourront être demandés si nécessaire.</li>
    <li>Vous pouvez continuer à découvrir d'autres biens disponibles.</li>
  `;
  sendBtn.innerText = "Envoyer ma candidature";
  browseBtn.innerText = "Voir d'autres biens";
}else{
  title.innerText = "Votre dossier est prêt";
  subtitle.innerText = "Votre profil peut être rapproché des opportunités adaptées.";
  nextSteps.innerHTML = `
    <li>Votre dossier sera étudié dans les prochains jours (3 à 5 jours ouvrés).</li>
    <li>Il pourra être rapproché des biens correspondant à votre profil.</li>
    <li>Vous pouvez dès maintenant consulter les offres disponibles.</li>
  `;
}

recapContent.innerHTML = `
Situation : ${step2.situation || "-"}<br>
Revenus : ${step2.revenu || "-"}<br>
Garant : ${step2.garant || "-"}<br>
Occupants : ${step3.occupants || "-"}
`;

function editStep(step){
  window.location.href = "dossier-v2-step" + step + ".html";
}

sendBtn.onclick = () => {
  sendBtn.disabled = true;
  sendBtn.innerText = "Envoi...";
  setTimeout(()=>{
    sendBtn.innerText = isSpecific ? "Candidature envoyée" : "Dossier envoyé";
    successMsg.style.display = "block";
  },1000);
};
</script>
</body>
</html>
