<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>KADDU — Étape 5</title><style>
:root{--or:#BF9650;--nbl:#07182B;--txt:#F8F4EE;--muted:rgba(248,244,238,.68);--bdr:rgba(191,150,80,.18);--green:#00C875;--red:#ff9f9f;--card:#0b2039}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:Arial,sans-serif;background:var(--nbl);color:var(--txt);line-height:1.6}
nav{position:sticky;top:0;background:rgba(7,24,43,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr);padding:18px 28px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.back{color:var(--txt);text-decoration:none;border:1px solid var(--bdr);padding:10px 14px}.top{max-width:980px;margin:0 auto;padding:18px 24px 0}
.sticky{position:sticky;top:78px;background:var(--card);border:1px solid var(--bdr);padding:14px 16px;z-index:9}.stepmsg{font-size:13px;color:var(--or);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.progress{height:8px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--or),var(--green))}
.box{max-width:980px;margin:18px auto 60px;background:var(--card);border:1px solid var(--bdr);padding:30px 24px}
h1{font-family:Georgia,serif;font-size:42px;font-weight:400;margin:0 0 8px}h1 em{font-style:italic;color:var(--or)}.sub{color:var(--muted);line-height:1.8;margin-bottom:24px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{margin-bottom:16px}label{display:block;font-size:12px;color:var(--or);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.help{font-size:13px;color:var(--muted);margin-top:6px}.req{color:#ffcc7a}
input,select,textarea{width:100%;padding:14px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);color:var(--txt);font-size:17px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--or)}textarea{min-height:98px;resize:vertical}
.error{display:none;color:var(--red);font-size:13px;margin-top:8px}.navbtns{display:flex;justify-content:space-between;gap:14px;margin-top:22px;flex-wrap:wrap}
.btn1,.btn2,.btn3,.btn4{padding:14px 16px;text-decoration:none;border:none;font-weight:700;cursor:pointer;display:inline-block}.btn1{background:var(--or);color:#111}
.btn2{border:1px solid var(--bdr);background:transparent;color:var(--txt)}.btn3{background:#25D366;color:#fff}.btn4{background:rgba(255,255,255,.04);color:var(--txt);border:1px solid var(--bdr)}
.notice{margin-top:18px;padding:14px 16px;border:1px solid rgba(0,200,117,.22);background:rgba(0,200,117,.05);color:var(--muted);line-height:1.7}.notice.warn{border-color:rgba(191,150,80,.35);background:rgba(191,150,80,.08)}
.recap{margin-top:18px;padding:14px 16px;border:1px solid var(--bdr);background:rgba(255,255,255,.03)}.recap-title{font-size:12px;color:var(--or);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.recap-item{color:var(--muted);line-height:1.6}.recap-item strong{display:block;color:var(--txt);font-weight:700}
.card{border:1px solid var(--bdr);padding:18px;background:rgba(255,255,255,.02);margin-bottom:16px}.badge{display:inline-block;padding:5px 10px;border:1px solid var(--bdr);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:8px}
.hidden{display:none!important}.score-box{border:1px solid var(--bdr);background:rgba(191,150,80,.06);padding:18px;text-align:center}.score-value{font-family:Georgia,serif;font-size:54px;color:var(--or);line-height:1}.score-label{margin-top:6px;color:var(--muted)}
ul.reason-list{margin:10px 0 0 18px;color:var(--muted);line-height:1.8}.file-card{border:1px dashed var(--bdr);padding:18px;background:rgba(255,255,255,.02);margin-bottom:14px}
.file-row{display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap}.file-meta,.muted,.small{font-size:13px;color:var(--muted)}
.status-pill{display:inline-block;padding:4px 8px;font-size:11px;border:1px solid var(--bdr);text-transform:uppercase;letter-spacing:.08em}.status-ok{color:var(--green);border-color:rgba(0,200,117,.25)}.status-warn{color:#ffcc7a;border-color:rgba(255,204,122,.3)}.status-bad{color:var(--red);border-color:rgba(255,159,159,.25)}
.toggle{display:flex;gap:8px;align-items:center;margin-top:8px}
@media(max-width:860px){.row,.recap-grid{grid-template-columns:1fr}h1{font-size:34px}}
</style></head><body>
<nav><a class="back" href="dossier-v2-step4.html">← Retour</a><div>Kàddu · Dossier premium</div></nav>
<div class="top"><div class="sticky"><div class="stepmsg">Étape 5 sur 5 · Vérification & envoi</div><div id="bienLabel" style="margin-bottom:10px;font-weight:700;"></div><div id="bienRent" class="small" style="margin-bottom:10px;"></div><div class="progress"><div class="fill" style="width:100%"></div></div></div></div>
<div class="box"><span class="badge">Dernière vérification</span><h1>Votre dossier est <em>presque prêt</em></h1><div class="sub">Notre équipe recevra votre dossier et les liens de vos justificatifs stockés sur Supabase.</div>
<div class="score-box"><div class="score-value" id="scoreValue">—</div><div class="score-label" id="scoreLabel">Analyse du dossier</div></div>
<div class="recap"><div class="recap-title">Récapitulatif</div><div class="recap-grid" id="recapGrid"></div></div>
<div class="card"><div class="badge">Points à vérifier</div><ul class="reason-list" id="reasonList"></ul></div>
<div class="notice" id="statusLine" style="display:none"></div>
<div class="navbtns"><a class="btn2" href="dossier-v2-step4.html">← Retour</a><button class="btn1" id="submitBtn" type="button">Envoyer mon dossier</button><button class="btn3" id="waBtn" type="button">Parler à un conseiller</button></div></div>
<script src="kaddu-v2-ux-hooks.js"></script><script src="kaddu-supabase-config.js"></script><script src="kaddu-supabase-save.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{KadduV2.setHeader(); const s1=KadduV2.loadStep('step1'),s2=KadduV2.loadStep('step2'),s3=KadduV2.loadStep('step3'),s4=KadduV2.loadStep('step4'); const result=KadduV2.computeScore(); document.getElementById('scoreValue').textContent=result.completeness+'%'; document.getElementById('scoreLabel').textContent=result.status+' · complétude du dossier';
[['Nom complet',[s1.prenom,s1.nom].filter(Boolean).join(' ')||'—'],['Téléphone',s1.telephone||'—'],['Email',s1.email||'—'],['Date d’entrée',s1.dateEntree||'—'],['Durée',s1.duree||'—'],['Situation',s2.situation||'—'],['Revenus',s2.revenu?Number(s2.revenu).toLocaleString('fr-FR')+' FCFA':'—'],['Pays de résidence',s2.paysResidence||'—'],['Logement actuel',s3.logementActuel||'—'],['Occupants',s3.nbOccupants||'—'],['Pièce d’identité',s4.docIdentiteStatus==='ok'?'Envoyée':s4.docIdentiteStatus==='deferred'?'Plus tard':'Manquante'],['Justificatif revenus',s4.docRevenusStatus==='ok'?'Envoyé':s4.docRevenusStatus==='deferred'?'Plus tard':'Manquant']].forEach(([label,val])=>{const div=document.createElement('div'); div.className='recap-item'; div.innerHTML='<strong>'+val+'</strong>'+label; document.getElementById('recapGrid').appendChild(div);});
const rl=document.getElementById('reasonList'); if(result.reasons.length){result.reasons.forEach(r=>{const li=document.createElement('li'); li.textContent=r; rl.appendChild(li);});} else rl.innerHTML='<li>Dossier cohérent à ce stade. Une validation humaine reste prévue.</li>';
document.getElementById('waBtn').addEventListener('click',()=>{const msg='Bonjour, je souhaite finaliser mon dossier pour '+KadduV2.getBienData().label+'.\n\nNom : '+([s1.prenom,s1.nom].filter(Boolean).join(' '))+'\nTéléphone : '+(s1.telephone||'')+'\nEmail : '+(s1.email||''); window.open('https://wa.me/'+(window.KADDU_SUPABASE.whatsappNumber||'221778647777')+'?text='+encodeURIComponent(msg),'_blank');});
document.getElementById('submitBtn').addEventListener('click',async()=>{const line=document.getElementById('statusLine'); line.style.display='block'; line.textContent='Enregistrement du dossier…'; try{const row=await KadduSupabaseSave.saveDossierToSupabase(); line.textContent='Dossier enregistré avec succès sous la référence '+(Array.isArray(row)&&row[0]&&row[0].dossier_ref?row[0].dossier_ref:'KADDU')+'.';}catch(err){line.textContent='Erreur Supabase : '+err.message;}});});</script></body></html>
